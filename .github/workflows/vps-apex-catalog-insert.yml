name: VPS Apex Insert Catalog Route

on:
  workflow_dispatch:

jobs:
  insert-apex-route:
    name: Insert explicit compintel.co catalog route before connie block
    runs-on: ubuntu-latest
    steps:
      - name: Insert apex route via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail

            ROOT_FILE="/etc/caddy/Caddyfile"
            BACKUP_FILE="/etc/caddy/Caddyfile.bak.$(date +%s)"

            CONNIE_HOME=$(grep 'Environment=HOME=' /etc/systemd/system/local-connie.service 2>/dev/null | sed 's/.*HOME=//')
            SITE_ROOT="$CONNIE_HOME/.automaton/site"
            sudo mkdir -p "$SITE_ROOT"

            # Ensure Caddyfile.root exists with correct content
            cat <<'CADDY_ROOT' | sudo tee /etc/caddy/Caddyfile.root >/dev/null
compintel.co {
    root * SITE_ROOT_PLACEHOLDER
    file_server
}
CADDY_ROOT
            sed -i "s|SITE_ROOT_PLACEHOLDER|$SITE_ROOT|g" /etc/caddy/Caddyfile.root

            # Ensure Caddyfile.www exists with correct content
            cat <<'CADDY_WWW' | sudo tee /etc/caddy/Caddyfile.www >/dev/null
www.compintel.co {
    redir https://compintel.co{uri} permanent
}
CADDY_WWW

            # Backup current Caddyfile
            sudo cp "$ROOT_FILE" "$BACKUP_FILE"
            echo "Backed up Caddyfile -> $BACKUP_FILE"

            # STEP 1: Remove ALL existing compintel.co blocks from main Caddyfile and imported files
            # This prevents "ambiguous site definition" errors
            echo "STEP 1: Removing any existing compintel.co blocks..."
            
            # Remove from main Caddyfile
            if grep -q "^compintel.co {" "$ROOT_FILE" 2>/dev/null; then
              echo "Found compintel.co block in main Caddyfile - removing..."
              sudo python3 <<'PY'
import pathlib

root_path = pathlib.Path("/etc/caddy/Caddyfile")
text = root_path.read_text(encoding="utf-8", errors="replace")
lines = text.splitlines()

out = []
i = 0
removed = 0
while i < len(lines):
    if lines[i].strip() == "compintel.co {":
        removed += 1
        depth = 1
        i += 1
        while i < len(lines) and depth > 0:
            depth += lines[i].count("{") - lines[i].count("}")
            i += 1
        continue
    out.append(lines[i])
    i += 1

root_path.write_text("\n".join(out) + "\n", encoding="utf-8")
print(f"Removed {removed} compintel.co block(s) from main Caddyfile")
PY
            fi

            # Remove from imported files
            for f in /etc/caddy/automaton-sites/*.caddy /etc/caddy/Caddyfile.*; do
              [ -f "$f" ] || continue
              if grep -q "^compintel.co {" "$f" 2>/dev/null; then
                echo "Found compintel.co block in $f - removing..."
                sudo python3 <<PY
import pathlib

path = pathlib.Path("$f")
text = path.read_text(encoding="utf-8", errors="replace")
lines = text.splitlines()

out = []
i = 0
removed = 0
while i < len(lines):
    if lines[i].strip() == "compintel.co {":
        removed += 1
        depth = 1
        i += 1
        while i < len(lines) and depth > 0:
            depth += lines[i].count("{") - lines[i].count("}")
            i += 1
        continue
    out.append(lines[i])
    i += 1

path.write_text("\n".join(out) + "\n", encoding="utf-8")
print(f"Removed {removed} compintel.co block(s) from $f")
PY
              fi
            done

            # Remove any existing Caddyfile.root import lines and markers from main file
            sudo sed -i '/import \/etc\/caddy\/Caddyfile\.root/d' "$ROOT_FILE"
            sudo sed -i '/# BEGIN AUTOMATON ROOT IMPORT/,/# END AUTOMATON ROOT IMPORT/d' "$ROOT_FILE"

            echo "STEP 1 complete - all existing compintel.co blocks removed"
            echo ""

            # STEP 2: Add new apex block before connie.compintel.co block
            echo "STEP 2: Inserting new apex catalog block..."
            
            CONNIE_LINE=$(grep -n "^connie.compintel.co {" "$ROOT_FILE" | head -1 | cut -d: -f1)
            echo "Found connie.compintel.co at line $CONNIE_LINE"

            # Create temp file with apex block inserted before connie block
            sudo head -n $((CONNIE_LINE - 1)) "$ROOT_FILE" > /tmp/caddy_part1.txt

            # Add apex block (using proper indentation without extra spaces)
            cat >> /tmp/caddy_part1.txt <<'APEX_BLOCK'

# BEGIN AUTOMATON APEX CATALOG
compintel.co {
    root * SITE_ROOT_PLACEHOLDER
    file_server
}
# END AUTOMATON APEX CATALOG

APEX_BLOCK

            # Replace placeholder with actual site root
            sed -i "s|SITE_ROOT_PLACEHOLDER|$SITE_ROOT|g" /tmp/caddy_part1.txt

            # Add the rest of the original file
            sudo tail -n +$CONNIE_LINE "$ROOT_FILE" >> /tmp/caddy_part1.txt

            # Move into place
            sudo mv /tmp/caddy_part1.txt "$ROOT_FILE"
            echo "STEP 2 complete - apex catalog block inserted at line $((CONNIE_LINE))"
            echo ""

            # STEP 3: Validate the configuration
            echo "STEP 3: Validating Caddy configuration..."
            sudo caddy adapt --config "$ROOT_FILE" >/tmp/caddy-adapted.json 2>&1 || {
              echo "ERROR: caddy adapt failed"
              cat /tmp/caddy-adapted.json
              echo "Rolling back..."
              sudo cp "$BACKUP_FILE" "$ROOT_FILE"
              sudo caddy validate --config "$ROOT_FILE" && sudo systemctl reload caddy || true
              exit 1
            }
            sudo caddy validate --config "$ROOT_FILE" || {
              echo "ERROR: caddy validate failed"
              echo "Rolling back..."
              sudo cp "$BACKUP_FILE" "$ROOT_FILE"
              sudo systemctl reload caddy || true
              exit 1
            }
            echo "STEP 3 complete - configuration is valid"
            echo ""

            # STEP 4: Reload Caddy
            echo "STEP 4: Reloading Caddy..."
            sudo systemctl reload caddy
            sleep 2
            echo "STEP 4 complete - Caddy reloaded"
            echo ""

            # STEP 5: Verify the fix
            echo "STEP 5: Running verification checks..."
            echo ""
            
            echo "--- compintel.co (expecting HTML) ---"
            curl -sSI https://compintel.co | head -6
            curl -sS https://compintel.co | head -5
            echo ""

            echo "--- www.compintel.co (expecting 301) ---"
            curl -sSI https://www.compintel.co | head -4
            echo ""

            echo "--- api.compintel.co/health (expecting 200) ---"
            curl -sS -o /dev/null -w "%{http_code}\n" https://api.compintel.co/health
            echo ""

            echo "--- relay.compintel.co/health (expecting 200) ---"
            curl -sS -o /dev/null -w "%{http_code}\n" https://relay.compintel.co/health
            echo ""

            echo "--- signal-api.compintel.co/health (expecting 200) ---"
            curl -sS -o /dev/null -w "%{http_code}\n" https://signal-api.compintel.co/health
            echo ""

            # Verify apex returns HTML not JSON
            CONTENT_TYPE=$(curl -sSI https://compintel.co | grep -i "content-type:" | head -1 | tr -d '\r' || echo "")
            if echo "$CONTENT_TYPE" | grep -q "text/html"; then
              echo "✅ compintel.co returns HTML content-type"
            else
              echo "❌ compintel.co content-type: $CONTENT_TYPE"
              echo "Rolling back..."
              sudo cp "$BACKUP_FILE" "$ROOT_FILE"
              sudo caddy validate --config "$ROOT_FILE" && sudo systemctl reload caddy
              exit 1
            fi

            # Check for catalog content marker
            if curl -sS https://compintel.co | grep -q "Compintel Product Catalog"; then
              echo "✅ compintel.co contains catalog content marker"
            else
              echo "❌ compintel.co missing catalog content marker"
              echo "Rolling back..."
              sudo cp "$BACKUP_FILE" "$ROOT_FILE"
              sudo caddy validate --config "$ROOT_FILE" && sudo systemctl reload caddy
              exit 1
            fi

            echo ""
            echo "✅ Apex catalog route insertion complete!"
            echo "Backup file: $BACKUP_FILE"
