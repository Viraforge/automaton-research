name: VPS Apex Insert Catalog Route

on:
  workflow_dispatch:

jobs:
  insert-apex-route:
    name: Insert explicit compintel.co catalog route before connie block
    runs-on: ubuntu-latest
    steps:
      - name: Insert apex route via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail

            ROOT_FILE="/etc/caddy/Caddyfile"
            BACKUP_FILE="/etc/caddy/Caddyfile.bak.$(date +%s)"

            CONNIE_HOME=$(grep 'Environment=HOME=' /etc/systemd/system/local-connie.service 2>/dev/null | sed 's/.*HOME=//')
            SITE_ROOT="$CONNIE_HOME/.automaton/site"
            sudo mkdir -p "$SITE_ROOT"

            # Ensure Caddyfile.root exists with correct content
            cat <<CADDY_ROOT | sudo tee /etc/caddy/Caddyfile.root >/dev/null
            compintel.co {
                root * $SITE_ROOT
                file_server
            }
            CADDY_ROOT

            # Ensure Caddyfile.www exists with correct content
            cat <<'CADDY_WWW' | sudo tee /etc/caddy/Caddyfile.www >/dev/null
            www.compintel.co {
                redir https://compintel.co{uri} permanent
            }
            CADDY_WWW

            # Backup current Caddyfile
            sudo cp "$ROOT_FILE" "$BACKUP_FILE"
            echo "Backed up Caddyfile -> $BACKUP_FILE"

            # Find the line number of connie.compintel.co block start
            CONNIE_LINE=$(grep -n "^connie.compintel.co {" "$ROOT_FILE" | head -1 | cut -d: -f1)
            echo "Found connie.compintel.co at line $CONNIE_LINE"

            # Create temp file with apex block inserted before connie block
            sudo head -n $((CONNIE_LINE - 1)) "$ROOT_FILE" > /tmp/caddy_part1.txt

            # Add apex block
            cat >> /tmp/caddy_part1.txt <<APEX_BLOCK

            # BEGIN AUTOMATON APEX CATALOG
            compintel.co {
                root * $SITE_ROOT
                file_server
            }
            # END AUTOMATON APEX CATALOG

            APEX_BLOCK

            # Add the rest of the original file
            sudo tail -n +$CONNIE_LINE "$ROOT_FILE" >> /tmp/caddy_part1.txt

            # Move into place
            sudo mv /tmp/caddy_part1.txt "$ROOT_FILE"

            # Remove any duplicate apex blocks or imports that might conflict
            # Keep only the first compintel.co block we just added
            sudo python3 <<'PY'
            import pathlib
            import re

            root_path = pathlib.Path("/etc/caddy/Caddyfile")
            text = root_path.read_text(encoding="utf-8", errors="replace")
            lines = text.splitlines()

            # Find all compintel.co block positions (but skip the first one we just added)
            host_pattern = re.compile(r"^\s*compintel\.co\s*\{\s*$")
            blocks_to_remove = []
            found_first = False

            i = 0
            while i < len(lines):
                if host_pattern.match(lines[i]):
                    if not found_first:
                        # Skip the first one (our new block)
                        found_first = True
                        # Find the end of this block
                        depth = 1
                        i += 1
                        while i < len(lines) and depth > 0:
                            depth += lines[i].count("{") - lines[i].count("}")
                            i += 1
                        continue
                    else:
                        # Mark this block for removal
                        start = i
                        depth = 1
                        i += 1
                        while i < len(lines) and depth > 0:
                            depth += lines[i].count("{") - lines[i].count("}")
                            i += 1
                        end = i
                        blocks_to_remove.append((start, end))
                        continue
                i += 1

            # Remove blocks from end to start to preserve line numbers
            for start, end in reversed(blocks_to_remove):
                del lines[start:end]
                print(f"Removed duplicate compintel.co block at lines {start+1}-{end}")

            # Also remove duplicate Caddyfile.root imports
            import_pattern = re.compile(r"^\s*import\s+/etc/caddy/Caddyfile\.root\s*$")
            found_import = False
            lines_to_keep = []
            for line in lines:
                if import_pattern.match(line):
                    if not found_import:
                        found_import = True
                        lines_to_keep.append(line)
                    else:
                        print(f"Removing duplicate import: {line.strip()}")
                else:
                    lines_to_keep.append(line)

            root_path.write_text("\n".join(lines_to_keep) + "\n", encoding="utf-8")
            print(f"Processed Caddyfile, removed {len(blocks_to_remove)} duplicate apex blocks")
            PY

            # Validate
            sudo caddy adapt --config "$ROOT_FILE" >/tmp/caddy-adapted.json 2>&1 || {
              echo "ERROR: caddy adapt failed"
              cat /tmp/caddy-adapted.json
              exit 1
            }
            sudo caddy validate --config "$ROOT_FILE" || {
              echo "ERROR: caddy validate failed"
              exit 1
            }

            # Reload
            sudo systemctl reload caddy
            sleep 2

            echo "=== Post-insertion checks ==="
            echo "--- compintel.co (expecting HTML) ---"
            curl -sSI https://compintel.co | head -6
            curl -sS https://compintel.co | head -5

            echo ""
            echo "--- www.compintel.co (expecting 301) ---"
            curl -sSI https://www.compintel.co | head -4

            echo ""
            echo "--- api.compintel.co/health (expecting 200) ---"
            curl -sS -o /dev/null -w "%{http_code}" https://api.compintel.co/health
            echo ""

            echo "--- relay.compintel.co/health (expecting 200) ---"
            curl -sS -o /dev/null -w "%{http_code}" https://relay.compintel.co/health
            echo ""

            echo "--- signal-api.compintel.co/health (expecting 200) ---"
            curl -sS -o /dev/null -w "%{http_code}" https://signal-api.compintel.co/health
            echo ""

            # Verify apex returns HTML not JSON
            CONTENT_TYPE=$(curl -sSI https://compintel.co | grep -i "content-type:" | head -1 | tr -d '\r' || echo "")
            if echo "$CONTENT_TYPE" | grep -q "text/html"; then
              echo "✅ compintel.co returns HTML content-type"
            else
              echo "❌ compintel.co content-type: $CONTENT_TYPE"
              echo "Rolling back..."
              sudo cp "$BACKUP_FILE" "$ROOT_FILE"
              sudo caddy validate --config "$ROOT_FILE" && sudo systemctl reload caddy
              exit 1
            fi

            # Check for catalog content marker
            if curl -sS https://compintel.co | grep -q "Compintel Product Catalog"; then
              echo "✅ compintel.co contains catalog content marker"
            else
              echo "❌ compintel.co missing catalog content marker"
              echo "Rolling back..."
              sudo cp "$BACKUP_FILE" "$ROOT_FILE"
              sudo caddy validate --config "$ROOT_FILE" && sudo systemctl reload caddy
              exit 1
            fi

            echo ""
            echo "✅ Apex catalog route insertion complete"
            echo "Backup file: $BACKUP_FILE"
