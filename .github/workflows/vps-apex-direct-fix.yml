name: VPS Apex Direct Fix

on:
  workflow_dispatch:

jobs:
  fix-apex:
    name: Direct SSH fix for compintel.co apex
    runs-on: ubuntu-latest
    steps:
      - name: SSH to VPS and fix apex route
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e

            # Backup
            sudo cp /etc/caddy/Caddyfile /etc/caddy/Caddyfile.bak.$(date +%s)
            echo "Backup created"

            # Step 1: Find and remove ALL bare compintel.co blocks
            echo "Removing existing compintel.co blocks..."
            for f in /etc/caddy/Caddyfile /etc/caddy/Caddyfile.* /etc/caddy/automaton-sites/*.caddy 2>/dev/null; do
              [ -f "$f" ] || continue
              if grep -q "^compintel.co {" "$f" 2>/dev/null; then
                echo "Found in $f - removing"
                sudo python3 -c "
import pathlib
import re
path = pathlib.Path('$f')
text = path.read_text()
lines = text.splitlines()
out = []
i = 0
while i < len(lines):
    if re.match(r'^compintel\.co\s*\{', lines[i]):
        depth = 1
        i += 1
        while i < len(lines) and depth > 0:
            depth += lines[i].count('{') - lines[i].count('}')
            i += 1
        continue
    out.append(lines[i])
    i += 1
path.write_text('\n'.join(out) + '\n')
print('Removed')
"
              fi
            done

            # Step 2: Find line number of connie.compintel.co
            CONNIE_LINE=$(grep -n "^connie.compintel.co {" /etc/caddy/Caddyfile | head -1 | cut -d: -f1)
            echo "connie.compintel.co is at line $CONNIE_LINE"

            # Step 3: Insert new apex block before connie
            echo "Inserting catalog block..."
            CONNIE_HOME=$(grep 'Environment=HOME=' /etc/systemd/system/local-connie.service 2>/dev/null | sed 's/.*HOME=//')
            
            sudo head -n $((CONNIE_LINE - 1)) /etc/caddy/Caddyfile > /tmp/new_caddy.txt
            
            cat >> /tmp/new_caddy.txt <<EOF

# BEGIN AUTOMATON APEX
compintel.co {
    root * $CONNIE_HOME/.automaton/site
    file_server
}
# END AUTOMATON APEX

EOF
            
            sudo tail -n +$CONNIE_LINE /etc/caddy/Caddyfile >> /tmp/new_caddy.txt
            sudo mv /tmp/new_caddy.txt /etc/caddy/Caddyfile

            # Step 4: Validate and reload
            echo "Validating..."
            sudo caddy validate --config /etc/caddy/Caddyfile
            
            echo "Reloading..."
            sudo systemctl reload caddy
            sleep 3

            # Step 5: Verify
            echo ""
            echo "Testing compintel.co:"
            curl -sSI https://compintel.co | grep -E "HTTP|content-type"
            BODY=$(curl -sS https://compintel.co | head -1)
            if echo "$BODY" | grep -q "Compintel Product Catalog"; then
              echo "SUCCESS: Apex serves catalog HTML"
            else
              echo "FAIL: Still getting: $BODY"
              exit 1
            fi

            echo ""
            echo "Testing subdomains:"
            curl -sS -o /dev/null -w "api: %{http_code}\n" https://api.compintel.co/health
            curl -sS -o /dev/null -w "relay: %{http_code}\n" https://relay.compintel.co/health
