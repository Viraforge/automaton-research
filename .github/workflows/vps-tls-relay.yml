name: VPS TLS Relay Setup

on:
  workflow_dispatch:

jobs:
  tls-setup:
    name: Configure Relay TLS (Caddy/Nginx + Certbot)
    runs-on: ubuntu-latest
    steps:
      - name: Configure TLS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            echo "=== Opening firewall ports ==="
            if command -v ufw &>/dev/null && sudo ufw status | grep -q "Status: active"; then
              echo "ufw is active, opening ports 80 and 443..."
              sudo ufw allow 80/tcp
              sudo ufw allow 443/tcp
              echo "✅ Firewall ports 80/443 opened"
            else
              echo "ℹ️ ufw not active or not installed"
            fi

            echo ""
            echo "=== Detecting web server ==="
            if command -v caddy &>/dev/null; then
              echo "Using Caddy"
              WEBSERVER="caddy"
            elif command -v nginx &>/dev/null; then
              echo "Using nginx"
              WEBSERVER="nginx"
            else
              echo "Installing nginx..."
              sudo apt-get update -qq
              sudo apt-get install -y -qq nginx certbot python3-certbot-nginx
              WEBSERVER="nginx"
            fi

            if [ "$WEBSERVER" = "caddy" ]; then
              echo ""
              echo "=== Caddy Configuration ==="
              echo "1) Creating relay config..."
              cat <<'CADDY_CONF' | sudo tee /etc/caddy/Caddyfile.relay >/dev/null
            relay.compintel.co {
                reverse_proxy http://127.0.0.1:8787
            }
            CADDY_CONF

              echo "2) Updating Caddyfile (removing duplicates)..."
              # Remove any existing relay config blocks and imports to avoid duplicates
              # This handles relay.compintel.co blocks and any import of relay files
              sudo sed -i '/relay\.compintel\.co/d' /etc/caddy/Caddyfile
              sudo sed -i '/Caddyfile\.relay/d' /etc/caddy/Caddyfile
              sudo sed -i '/^import.*relay/d' /etc/caddy/Caddyfile
              # Remove any blank lines at end to keep clean
              sudo sed -i -e :a -e '/^\n*$/{$d;N;ba' -e '}' /etc/caddy/Caddyfile
              # Add the import
              echo 'import /etc/caddy/Caddyfile.relay' | sudo tee -a /etc/caddy/Caddyfile >/dev/null

              echo "3) Diagnostics - Checking Caddyfile..."
              echo "--- Last 15 lines of Main Caddyfile ---"
              sudo tail -15 /etc/caddy/Caddyfile
              echo ""
              echo "--- Relay Import File ---"
              sudo cat /etc/caddy/Caddyfile.relay
              echo ""

              echo "3b) Testing Caddy config..."
              sudo caddy validate --config /etc/caddy/Caddyfile || true

              echo "3c) Clearing ACME cache (to reset failed attempts)..."
              sudo rm -rf /var/lib/caddy/.local/share/caddy/acme/
              echo "✅ ACME cache cleared"

              echo "4) Reloading Caddy..."
              sudo systemctl reload caddy

              sleep 3
              echo ""
              echo "5) Checking Caddy status..."
              systemctl is-active caddy >/dev/null && echo "✅ Caddy is running" || echo "⚠️ Caddy not running"
              sudo systemctl status caddy --no-pager | head -5

              echo ""
              echo "=== Verification ==="
              curl -fsS https://relay.compintel.co/health && echo "✅ Public relay health OK" || echo "⚠️ Public health check (may be pending DNS)"

            else
              echo ""
              echo "=== Nginx Configuration ==="
              echo "1) Creating directories..."
              sudo mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled

              echo "2) Creating site config..."
              cat <<'NGINX_CONF' | sudo tee /etc/nginx/sites-available/relay.compintel.co >/dev/null
            server {
                listen 80;
                server_name relay.compintel.co;
                location / {
                    proxy_pass http://127.0.0.1:8787;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                }
            }
            NGINX_CONF

              echo "3) Enabling site..."
              sudo ln -sf /etc/nginx/sites-available/relay.compintel.co /etc/nginx/sites-enabled/relay.compintel.co

              echo "4) Testing nginx config..."
              sudo nginx -t

              echo "5) Reloading nginx..."
              sudo systemctl reload nginx

              sleep 3

              echo "6) Running certbot..."
              sudo certbot --nginx -d relay.compintel.co --redirect -m ops@compintel.co --agree-tos --no-eff-email --non-interactive || echo "⚠️ Certbot may already exist"

              echo "7) Reloading nginx after certbot..."
              sudo systemctl reload nginx

              sleep 2
              echo ""
              echo "=== Verification ==="
              curl -fsS https://relay.compintel.co/health && echo "✅ Public relay health OK" || echo "⚠️ Public health check (may be pending DNS/cert)"
            fi

            echo ""
            echo "=== TLS Setup Complete ==="
