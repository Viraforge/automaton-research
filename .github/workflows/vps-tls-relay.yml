name: VPS TLS Relay Setup

on:
  workflow_dispatch:

jobs:
  tls-setup:
    name: Configure Relay TLS (Nginx + Certbot)
    runs-on: ubuntu-latest
    steps:
      - name: Configure TLS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            echo "=== 1) Creating nginx site config ==="
            sudo tee /etc/nginx/sites-available/relay.compintel.co >/dev/null <<'NGINX'
            server {
                listen 80;
                server_name relay.compintel.co;
                location / {
                    proxy_pass http://127.0.0.1:8787;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                }
            }
            NGINX

            echo "=== 2) Enabling site ==="
            sudo ln -sf /etc/nginx/sites-available/relay.compintel.co /etc/nginx/sites-enabled/relay.compintel.co

            echo "=== 3) Testing nginx config ==="
            sudo nginx -t

            echo "=== 4) Reloading nginx ==="
            sudo systemctl reload nginx

            echo "=== 5) Waiting for nginx to be ready ==="
            sleep 3
            curl -fsS http://127.0.0.1/health || echo "Note: curl may fail if health endpoint not on nginx directly"

            echo "=== 6) Running certbot for TLS certificate ==="
            sudo certbot --nginx -d relay.compintel.co --redirect -m ops@compintel.co --agree-tos --no-eff-email --non-interactive || echo "Certbot may already exist or cert issued"

            echo "=== 7) Reloading nginx after certbot ==="
            sudo systemctl reload nginx

            echo ""
            echo "=== Final Verification ==="
            sleep 2
            curl -fsS https://relay.compintel.co/health && echo "✅ Public relay health OK" || echo "⚠️ Public health check pending DNS/cert propagation"
