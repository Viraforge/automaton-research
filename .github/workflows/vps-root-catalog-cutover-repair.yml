name: VPS Root Catalog Cutover Repair

on:
  workflow_dispatch:

jobs:
  repair-cutover:
    name: Repair root catalog cutover on Connie VPS
    runs-on: ubuntu-latest
    steps:
      - name: Force root cutover via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 12m
          script: |
            set -euo pipefail

            CONNIE_HOME=$(grep 'Environment=HOME=' /etc/systemd/system/local-connie.service 2>/dev/null | sed 's/.*HOME=//')
            REPO=$(grep 'ExecStart=' /etc/systemd/system/local-connie.service 2>/dev/null | sed 's/.*node //' | sed 's|/dist/.*||')
            SITE_ROOT="$CONNIE_HOME/.automaton/site"
            PRODUCTS_PATH="$CONNIE_HOME/.automaton/products.json"

            if [ -z "$CONNIE_HOME" ] || [ -z "$REPO" ]; then
              echo "Could not resolve CONNIE_HOME or repo path"
              exit 1
            fi

            sudo mkdir -p "$SITE_ROOT"
            sudo cp /etc/caddy/Caddyfile /etc/caddy/Caddyfile.bak.$(date +%s)
            BACKUP=$(ls -1t /etc/caddy/Caddyfile.bak.* | head -1)

            # Generate catalog
            if [ -f "$REPO/dist/publication/generate-compintel-site.js" ] && [ -f "$PRODUCTS_PATH" ]; then
              cd "$REPO"
              PRODUCTS_PATH="$PRODUCTS_PATH" SITE_ROOT="$SITE_ROOT" node --input-type=module -e "
              import { generateCompintelSite } from './dist/publication/generate-compintel-site.js';
              const result = await generateCompintelSite({
                registryPath: process.env.PRODUCTS_PATH,
                siteRoot: process.env.SITE_ROOT,
              });
              console.log('Generated catalog:', JSON.stringify(result));
              "
            fi

            echo ""
            echo "=== FINDING compintel.co blocks ==="
            
            # Find all files with bare compintel.co block
            FOUND_FILES=""
            for f in /etc/caddy/Caddyfile /etc/caddy/Caddyfile.* /etc/caddy/automaton-sites/*.caddy 2>/dev/null; do
              [ -f "$f" ] || continue
              if grep -q "^compintel.co {" "$f" 2>/dev/null; then
                echo "FOUND: $f"
                FOUND_FILES="$FOUND_FILES $f"
              fi
            done

            if [ -z "$FOUND_FILES" ]; then
              echo "No bare compintel.co blocks found - good"
            else
              echo ""
              echo "=== REMOVING compintel.co blocks ==="
              for f in $FOUND_FILES; do
                echo "Processing: $f"
                sudo python3 <<PY
            import pathlib
            import re
            
            path = pathlib.Path("$f")
            text = path.read_text()
            lines = text.splitlines()
            out = []
            i = 0
            
            while i < len(lines):
                line = lines[i]
                if re.match(r'^compintel\.co\s*\{', line):
                    depth = 1
                    i += 1
                    while i < len(lines) and depth > 0:
                        depth += lines[i].count('{') - lines[i].count('}')
                        i += 1
                    continue
                out.append(line)
                i += 1
            
            path.write_text('\n'.join(out) + '\n')
            print(f"  Removed from $f")
            PY
              done
            fi

            echo ""
            echo "=== INSERTING catalog block ==="
            
            # Find connie block line
            CONNIE_LINE=$(grep -n "^connie.compintel.co {" /etc/caddy/Caddyfile | head -1 | cut -d: -f1)
            echo "connie.compintel.co at line $CONNIE_LINE"
            
            # Build new Caddyfile with catalog block before connie
            sudo head -n $((CONNIE_LINE - 1)) /etc/caddy/Caddyfile > /tmp/caddy_new.txt
            
            cat >> /tmp/caddy_new.txt <<'BLOCK'

# BEGIN AUTOMATON APEX
compintel.co {
    root * SITE_ROOT_PLACEHOLDER
    file_server
}
# END AUTOMATON APEX

BLOCK
            sed -i "s|SITE_ROOT_PLACEHOLDER|$SITE_ROOT|g" /tmp/caddy_new.txt
            
            sudo tail -n +$CONNIE_LINE /etc/caddy/Caddyfile >> /tmp/caddy_new.txt
            sudo mv /tmp/caddy_new.txt /etc/caddy/Caddyfile
            
            echo "Inserted apex block at line $CONNIE_LINE"

            # Also write import files for consistency
            sudo tee /etc/caddy/Caddyfile.root >/dev/null <<'ROOTBLOCK'
compintel.co {
    root * SITE_ROOT_PLACEHOLDER
    file_server
}
ROOTBLOCK
            sed -i "s|SITE_ROOT_PLACEHOLDER|$SITE_ROOT|g" /etc/caddy/Caddyfile.root

            sudo tee /etc/caddy/Caddyfile.www >/dev/null <<'EOF'
www.compintel.co {
    redir https://compintel.co{uri} permanent
}
EOF

            echo ""
            echo "=== VALIDATING ==="
            sudo caddy validate --config /etc/caddy/Caddyfile || {
              echo "VALIDATION FAILED - restoring backup"
              sudo cp "$BACKUP" /etc/caddy/Caddyfile
              sudo systemctl reload caddy
              exit 1
            }

            echo ""
            echo "=== RELOADING CADDY ==="
            sudo systemctl reload caddy
            sleep 3

            echo ""
            echo "=== VERIFICATION ==="
            echo "compintel.co headers:"
            curl -sSI https://compintel.co | grep -E "HTTP|content-type"
            
            echo ""
            echo "compintel.co body (first line):"
            curl -sS https://compintel.co | head -1
            
            echo ""
            echo "Subdomain health checks:"
            curl -sS -o /dev/null -w "api: %{http_code}\n" https://api.compintel.co/health
            curl -sS -o /dev/null -w "relay: %{http_code}\n" https://relay.compintel.co/health
            curl -sS -o /dev/null -w "signal-api: %{http_code}\n" https://signal-api.compintel.co/health

            # Final test
            if curl -sS https://compintel.co | grep -q "Compintel Product Catalog"; then
              echo ""
              echo "SUCCESS: compintel.co serves catalog HTML"
            else
              echo ""
              echo "FAIL: compintel.co still not serving catalog"
              echo "Restoring backup..."
              sudo cp "$BACKUP" /etc/caddy/Caddyfile
              sudo caddy validate --config /etc/caddy/Caddyfile && sudo systemctl reload caddy
              exit 1
            fi
