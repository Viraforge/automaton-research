name: VPS Root Catalog Cutover Repair

on:
  workflow_dispatch:

jobs:
  repair-cutover:
    name: Repair root catalog cutover on Connie VPS
    runs-on: ubuntu-latest
    steps:
      - name: Force root cutover via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 12m
          script: |
            set -euo pipefail

            CONNIE_HOME=$(grep 'Environment=HOME=' /etc/systemd/system/local-connie.service 2>/dev/null | sed 's/.*HOME=//')
            REPO=$(grep 'ExecStart=' /etc/systemd/system/local-connie.service 2>/dev/null | sed 's/.*node //' | sed 's|/dist/.*||')
            SITE_ROOT="$CONNIE_HOME/.automaton/site"
            PRODUCTS_PATH="$CONNIE_HOME/.automaton/products.json"

            if [ -z "$CONNIE_HOME" ] || [ -z "$REPO" ]; then
              echo "Could not resolve CONNIE_HOME or repo path from local-connie.service"
              exit 1
            fi

            sudo mkdir -p "$SITE_ROOT"
            sudo cp /etc/caddy/Caddyfile /etc/caddy/Caddyfile.bak.$(date +%s)

            if [ -f "$REPO/dist/publication/generate-compintel-site.js" ] && [ -f "$PRODUCTS_PATH" ]; then
              cd "$REPO"
              PRODUCTS_PATH="$PRODUCTS_PATH" SITE_ROOT="$SITE_ROOT" node --input-type=module -e "
              import { generateCompintelSite } from './dist/publication/generate-compintel-site.js';
              const result = await generateCompintelSite({
                registryPath: process.env.PRODUCTS_PATH,
                siteRoot: process.env.SITE_ROOT,
              });
              console.log('Generated catalog:', JSON.stringify(result));
              "
            else
              echo "Generator or products registry missing; writing fallback catalog page"
              cat <<'HTML' | sudo tee "$SITE_ROOT/index.html" >/dev/null
            <!doctype html>
            <html lang="en">
            <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Compintel Catalog</title></head>
            <body>
              <main>
                <h1>Compintel Product Catalog</h1>
                <p>Auto-generated from Connie's product registry.</p>
                <section><h2>Published</h2><p>No products yet.</p></section>
                <section><h2>Draft</h2><p>No products yet.</p></section>
              </main>
            </body>
            </html>
            HTML
            fi

            echo "Removing conflicting apex/www blocks from all Caddy files..."
            
            # First, aggressively remove from automaton-sites directory
            for f in /etc/caddy/automaton-sites/*.caddy 2>/dev/null; do
              [ -f "$f" ] || continue
              if grep -q "^compintel.co {" "$f" 2>/dev/null || grep -q "^www.compintel.co {" "$f" 2>/dev/null; then
                echo "Found apex/www block in $f - removing..."
                sudo python3 <<PY
            import pathlib
            import re
            
            path = pathlib.Path("$f")
            text = path.read_text(encoding="utf-8", errors="replace")
            lines = text.splitlines()
            
            out = []
            i = 0
            removed = 0
            
            host_expr = re.compile(r'^\s*(?:https?://)?(compintel\.co|www\.compintel\.co)\s*\{\s*$', re.IGNORECASE)
            
            while i < len(lines):
                line = lines[i]
                match = host_expr.match(line)
                if match:
                    removed += 1
                    depth = line.count("{") - line.count("}")
                    i += 1
                    while i < len(lines):
                        depth += lines[i].count("{") - lines[i].count("}")
                        i += 1
                        if depth <= 0:
                            break
                    continue
                out.append(line)
                i += 1
            
            path.write_text("\n".join(out) + "\n", encoding="utf-8")
            print(f"  Removed {removed} blocks from $f")
            PY
              fi
            done
            
            # Then remove from all Caddyfile.* files
            for f in /etc/caddy/Caddyfile.* 2>/dev/null; do
              [ -f "$f" ] || continue
              if grep -q "^compintel.co {" "$f" 2>/dev/null || grep -q "^www.compintel.co {" "$f" 2>/dev/null; then
                echo "Found apex/www block in $f - removing..."
                sudo python3 <<PY
            import pathlib
            import re
            
            path = pathlib.Path("$f")
            text = path.read_text(encoding="utf-8", errors="replace")
            lines = text.splitlines()
            
            out = []
            i = 0
            
            host_expr = re.compile(r'^\s*(?:https?://)?(compintel\.co|www\.compintel\.co)\s*\{\s*$', re.IGNORECASE)
            
            while i < len(lines):
                line = lines[i]
                match = host_expr.match(line)
                if match:
                    depth = line.count("{") - line.count("}")
                    i += 1
                    while i < len(lines):
                        depth += lines[i].count("{") - lines[i].count("}")
                        i += 1
                        if depth <= 0:
                            break
                    continue
                out.append(line)
                i += 1
            
            path.write_text("\n".join(out) + "\n", encoding="utf-8")
            print(f"  Removed from $f")
            PY
              fi
            done
            
            # Finally, remove from main Caddyfile
            echo "Processing main Caddyfile..."
            sudo python3 <<'PY'
            import pathlib
            import re
            
            root_path = pathlib.Path("/etc/caddy/Caddyfile")
            text = root_path.read_text(encoding="utf-8", errors="replace")
            lines = text.splitlines()
            
            out = []
            i = 0
            removed = 0
            
            # Match compintel.co or www.compintel.co blocks (with optional http:// or https://)
            host_expr = re.compile(r'^\s*(?:https?://)?(compintel\.co|www\.compintel\.co)\s*\{\s*$', re.IGNORECASE)
            
            while i < len(lines):
                line = lines[i]
                match = host_expr.match(line)
                if match:
                    removed += 1
                    depth = line.count("{") - line.count("}")
                    i += 1
                    while i < len(lines):
                        depth += lines[i].count("{") - lines[i].count("}")
                        i += 1
                        if depth <= 0:
                            break
                    continue
                out.append(line)
                i += 1
            
            root_path.write_text("\n".join(out) + "\n", encoding="utf-8")
            print(f"Removed {removed} apex/www blocks from main Caddyfile")
            PY
            
            echo "Apex/www block removal complete"

            # Write Caddyfile.root without indentation
            sudo tee /etc/caddy/Caddyfile.root >/dev/null <<CADDY_ROOT
compintel.co {
    root * $SITE_ROOT
    file_server
}
CADDY_ROOT

            # Write Caddyfile.www without indentation
            sudo tee /etc/caddy/Caddyfile.www >/dev/null <<'CADDY_WWW'
www.compintel.co {
    redir https://compintel.co{uri} permanent
}
CADDY_WWW

            sudo sed -i '/import \/etc\/caddy\/Caddyfile\.root/d' /etc/caddy/Caddyfile
            sudo sed -i '/import \/etc\/caddy\/Caddyfile\.www/d' /etc/caddy/Caddyfile
            sudo sed -i '/BEGIN AUTOMATON ROOT IMPORT/,/END AUTOMATON ROOT IMPORT/d' /etc/caddy/Caddyfile
            sudo sed -i '/BEGIN AUTOMATON WWW IMPORT/,/END AUTOMATON WWW IMPORT/d' /etc/caddy/Caddyfile

            {
              echo ""
              echo "# BEGIN AUTOMATON ROOT IMPORT"
              echo "import /etc/caddy/Caddyfile.root"
              echo "# END AUTOMATON ROOT IMPORT"
              echo "# BEGIN AUTOMATON WWW IMPORT"
              echo "import /etc/caddy/Caddyfile.www"
              echo "# END AUTOMATON WWW IMPORT"
            } | sudo tee -a /etc/caddy/Caddyfile >/dev/null

            sudo caddy validate --config /etc/caddy/Caddyfile
            sudo systemctl reload caddy
            sleep 2

            echo "=== Site root preview ==="
            sudo sed -n '1,80p' "$SITE_ROOT/index.html" || true

            echo "=== Public checks ==="
            curl -sSI https://www.compintel.co | head -6 || true
            curl -sS https://compintel.co | rg -n "Compintel Product Catalog|Auto-generated from Connie's product registry|Published|Draft" || true

