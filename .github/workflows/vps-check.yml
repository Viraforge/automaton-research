name: VPS Health Check
on:
  workflow_dispatch:
jobs:
  check:
    name: Check Connie VPS
    runs-on: ubuntu-latest
    steps:
      - name: Check VPS status
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            CONNIE_HOME=$(grep 'Environment=HOME=' /etc/systemd/system/local-connie.service 2>/dev/null | sed 's/.*HOME=//')

            echo "=== 1. Service Status ==="
            systemctl status local-connie --no-pager -l 2>&1 | head -12

            echo ""
            echo "=== 2. Find state.db ==="
            DB=$(find "$CONNIE_HOME" -name "state.db" -type f 2>/dev/null | head -1)
            if [ -z "$DB" ]; then
              echo "state.db not found anywhere under $CONNIE_HOME"
              # Try reading dbPath from config
              DB_FROM_CONFIG=$(python3 -c "import json; c=json.load(open('$CONNIE_HOME/.automaton/automaton.json')); p=c.get('dbPath',''); print(p.replace('~','$CONNIE_HOME'))" 2>/dev/null)
              if [ -n "$DB_FROM_CONFIG" ] && [ -f "$DB_FROM_CONFIG" ]; then
                DB="$DB_FROM_CONFIG"
                echo "Found via config: $DB"
              fi
            else
              echo "Found: $DB"
            fi

            echo ""
            echo "=== 3. DB Schema ==="
            if [ -n "$DB" ] && [ -f "$DB" ]; then
              echo "Tables:"
              sqlite3 "$DB" ".tables" 2>/dev/null || echo "Cannot read DB (locked?)"
              echo ""
              echo "Agent state KV:"
              sqlite3 "$DB" "SELECT key, substr(value,1,160) FROM kv WHERE key IN ('agent_state', 'sleep_until', 'orchestrator.state', 'current_tier', 'forcedSleep', 'loop_detection_state', 'last_discord_heartbeat', 'last_discord_error') ORDER BY key;" 2>/dev/null || echo "No kv table"
            else
              echo "No DB available"
            fi

            echo ""
            echo "=== 4. Recent Goals ==="
            if [ -n "$DB" ] && [ -f "$DB" ]; then
              sqlite3 "$DB" "SELECT id, title, status, created_at FROM goals ORDER BY created_at DESC LIMIT 5;" 2>/dev/null || echo "No goals table"
            fi

            echo ""
            echo "=== 5. Task Graph ==="
            if [ -n "$DB" ] && [ -f "$DB" ]; then
              sqlite3 "$DB" "SELECT title, status, updated_at FROM task_graph ORDER BY updated_at DESC LIMIT 10;" 2>/dev/null || echo "No task_graph table"
            fi

            echo ""
            echo "=== 6. Recent Turns (last 5) ==="
            if [ -n "$DB" ] && [ -f "$DB" ]; then
              sqlite3 "$DB" "SELECT id, substr(thought, 1, 120) as thought, tool_calls, created_at FROM turns ORDER BY created_at DESC LIMIT 5;" 2>/dev/null || echo "No turns table"
            fi

            echo ""
            echo "=== 7. WORKLOG.md ==="
            find "$CONNIE_HOME" -name "WORKLOG.md" -type f 2>/dev/null | while read f; do
              echo "--- $f ---"
              head -40 "$f"
            done
            echo "(end)"

            echo ""
            echo "=== 8. Webhook Security ==="
            if grep -q "discord.com/api/webhooks" "$CONNIE_HOME/.automaton/SOUL.md" 2>/dev/null; then
              echo "WARNING: Webhook URL still in SOUL.md!"
            else
              echo "OK: No webhook URL in SOUL.md"
            fi
            python3 -c "import json; c=json.load(open('$CONNIE_HOME/.automaton/automaton.json')); print('automaton.json webhook:', 'SET' if c.get('discordWebhookUrl') else 'NOT SET')" 2>/dev/null

            echo ""
            echo "=== 8.5 Discord Heartbeat JSONL (tail) ==="
            HEARTBEAT_LOG="$CONNIE_HOME/.automaton/discord-heartbeat.log"
            if [ -f "$HEARTBEAT_LOG" ]; then
              tail -20 "$HEARTBEAT_LOG"
            else
              echo "No discord-heartbeat.log at $HEARTBEAT_LOG"
            fi

            echo ""
            echo "=== 8.6 Watchdog Retirement Checks ==="
            if [ -f "$CONNIE_HOME/connie-health-check.sh" ] || [ -f "$CONNIE_HOME/scripts/connie-health-check.sh" ]; then
              echo "WARNING: legacy connie-health-check.sh still present"
            else
              echo "OK: legacy connie-health-check.sh not found"
            fi
            if systemctl list-units --type=service --all --no-pager 2>/dev/null | grep -q "connie-watchdog.service"; then
              echo "WARNING: connie-watchdog.service exists"
            else
              echo "OK: no connie-watchdog.service"
            fi
            if crontab -u root -l 2>/dev/null | grep -Eq "connie-health-check|connie-watchdog|watchdog.*connie|/\\.automaton-research-home/scripts/watchdog"; then
              echo "WARNING: root crontab still has watchdog entries"
              crontab -u root -l 2>/dev/null | grep -E "connie-health-check|connie-watchdog|watchdog.*connie|/\\.automaton-research-home/scripts/watchdog" || true
            else
              echo "OK: root crontab has no watchdog entries"
            fi

            echo ""
            echo "=== 9. Recent Errors ==="
            grep -E "\[FATAL\]|\[ERROR\]" /tmp/connie-research.log 2>/dev/null | tail -5 || echo "No errors"

            echo ""
            echo "=== 10. App Log (last 80 lines) ==="
            tail -80 /tmp/connie-research.log 2>/dev/null || echo "No log file"
