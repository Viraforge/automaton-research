name: VPS Health Check
on:
  workflow_dispatch:
jobs:
  check:
    name: Check Connie VPS
    runs-on: ubuntu-latest
    steps:
      - name: Check VPS status
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== Service Status ==="
            systemctl status local-connie --no-pager -l 2>&1 | head -20

            # Get the HOME used by the service
            CONNIE_HOME=$(grep 'Environment=HOME=' /etc/systemd/system/local-connie.service 2>/dev/null | sed 's/.*HOME=//')
            echo "Connie HOME: $CONNIE_HOME"

            echo ""
            echo "=== Git Status ==="
            cd /root/.openclaw/workspace/artifacts/automaton-research
            git log --oneline -3

            echo ""
            echo "=== Discord Heartbeat Log ==="
            tail -10 "$CONNIE_HOME/.automaton/discord-heartbeat.log" 2>/dev/null || echo "No log file yet"
            echo "(also checking /root)"
            tail -5 /root/.automaton/discord-heartbeat.log 2>/dev/null || echo "No log at /root either"

            echo ""
            echo "=== Automaton Config ==="
            python3 -c "
            import json, os, glob
            for p in ['$CONNIE_HOME/.automaton/automaton.json', '/root/.automaton/automaton.json']:
                if os.path.exists(p):
                    c = json.load(open(p))
                    print(f'Config at: {p}')
                    print(f'  discordWebhookUrl: {\"SET\" if c.get(\"discordWebhookUrl\") else \"NOT SET\"}')
                    print(f'  useSovereignProviders: {c.get(\"useSovereignProviders\", \"NOT SET\")}')
                    print(f'  vultrApiKey: {\"SET\" if c.get(\"vultrApiKey\") else \"NOT SET\"}')
                    print(f'  inferenceModel: {c.get(\"inferenceModel\", \"NOT SET\")}')
                    print(f'  name: {c.get(\"name\", \"NOT SET\")}')
            " 2>/dev/null || echo "Config parse error"

            echo ""
            echo "=== EnvironmentFile contents ==="
            for f in $(grep 'EnvironmentFile' /etc/systemd/system/local-connie.service.d/env.conf 2>/dev/null | sed 's/EnvironmentFile=//; s/-//'); do
              echo "File: $f"
              cat "$f" 2>/dev/null | grep -i "DISCORD\|WEBHOOK" | sed 's/=.*/=SET/' || echo "  No discord/webhook vars"
            done

            echo ""
            echo "=== Crash Notify Script (webhook source) ==="
            cat "$CONNIE_HOME/connie-crash-notify.sh" 2>/dev/null | grep -i "webhook\|discord\|curl" | sed 's|discord.com/api/webhooks/[^ "]*|discord.com/api/webhooks/REDACTED|gi' || echo "No crash notify script"
            echo ""
            echo "=== Watchdog Service ==="
            systemctl status watchdog --no-pager -l 2>&1 | head -10 || echo "No watchdog service"
            echo ""
            echo "=== Watchdog Unit File ==="
            systemctl cat watchdog 2>/dev/null | head -30 || echo "No watchdog unit"
            echo ""
            echo "=== Watchdog Script (first 50 lines) ==="
            WATCHDOG_EXEC=$(systemctl cat watchdog 2>/dev/null | grep ExecStart | head -1 | sed 's/ExecStart=//')
            if [ -n "$WATCHDOG_EXEC" ]; then
              head -50 "$WATCHDOG_EXEC" 2>/dev/null || echo "Can't read: $WATCHDOG_EXEC"
            else
              echo "No ExecStart found"
            fi
            echo ""
            echo "=== connie-monitor process ==="
            ps aux | grep -i "monitor\|watchdog" | grep -v grep | head -10
            echo ""
            echo "=== Application Log (last 50 lines) ==="
            tail -50 /tmp/connie-research.log 2>/dev/null || echo "No app log"
