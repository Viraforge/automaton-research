name: VPS Health Check
on:
  workflow_dispatch:
jobs:
  check:
    name: Check Connie VPS
    runs-on: ubuntu-latest
    steps:
      - name: Check VPS status
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            CONNIE_HOME=$(grep 'Environment=HOME=' /etc/systemd/system/local-connie.service 2>/dev/null | sed 's/.*HOME=//')

            echo "=== 1. /tmp/request_body.json ==="
            cat /tmp/request_body.json 2>/dev/null || echo "not found"

            echo ""
            echo "=== 2. /tmp/request_body_air.json ==="
            cat /tmp/request_body_air.json 2>/dev/null || echo "not found"

            echo ""
            echo "=== 3. polymarket-api server.js (first 50 lines) ==="
            head -50 "$CONNIE_HOME/polymarket-api/server.js" 2>/dev/null || echo "not found"

            echo ""
            echo "=== 4. polymarket-api - grep discord/webhook/monitor ==="
            grep -rn "discord\|webhook\|monitor\|watchdog\|FATAL\|crash\|notify\|curl.*POST" "$CONNIE_HOME/polymarket-api/" 2>/dev/null | head -20 || echo "none"

            echo ""
            echo "=== 5. discord-bot directory ==="
            find "$CONNIE_HOME/discord-bot/" -type f 2>/dev/null | head -10
            cat "$CONNIE_HOME/discord-bot/bot.js" 2>/dev/null | head -40 || echo "no bot.js"
            cat "$CONNIE_HOME/discord-bot/index.js" 2>/dev/null | head -40 || echo "no index.js"

            echo ""
            echo "=== 6. PM2 processes (fresh) ==="
            PM2_HOME="$CONNIE_HOME/.pm2" pm2 list 2>/dev/null || echo "PM2 not available"
            echo "--- PM2 dump ---"
            cat "$CONNIE_HOME/.pm2/dump.pm2" 2>/dev/null || echo "no dump"

            echo ""
            echo "=== 7. GREP ALL JS FILES FOR DISCORD POSTING ==="
            grep -rln "discord\.com/api/webhooks\|discordWebhookUrl\|DISCORD_WEBHOOK\|connie-monitor\|connie-watchdog" "$CONNIE_HOME" --include="*.js" 2>/dev/null || echo "NONE"

            echo ""
            echo "=== 8. WHO WRITES /tmp/request_body ==="
            grep -rn "request_body" "$CONNIE_HOME" --include="*.js" --include="*.sh" 2>/dev/null | head -10

            echo ""
            echo "=== 9. Kill PM2 and delete temp files ==="
            PM2_HOME="$CONNIE_HOME/.pm2" pm2 delete all 2>/dev/null || true
            PM2_HOME="$CONNIE_HOME/.pm2" pm2 kill 2>/dev/null || true
            rm -f /tmp/request_body.json /tmp/request_body_air.json
            rm -f "$CONNIE_HOME/.pm2/dump.pm2"
            echo "Cleaned PM2 and temp files"

            echo ""
            echo "=== 10. App log last 15 lines ==="
            tail -15 /tmp/connie-research.log 2>/dev/null
