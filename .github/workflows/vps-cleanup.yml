name: VPS Cleanup Noisy Monitors
on:
  workflow_dispatch:
jobs:
  cleanup:
    name: Kill Noisy Discord Monitors
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            CONNIE_HOME=$(grep 'Environment=HOME=' /etc/systemd/system/local-connie.service 2>/dev/null | sed 's/.*HOME=//')

            echo "=== Current crontab ==="
            crontab -l 2>/dev/null || echo "No crontab"

            echo ""
            echo "=== Removing cron jobs that post to Discord ==="
            crontab -l 2>/dev/null | grep -v "connie-health-check\|health-monitor\|log-forwarder\|discord" | crontab - 2>/dev/null && echo "Cleaned crontab" || echo "No crontab to clean"

            echo ""
            echo "=== Crontab after cleanup ==="
            crontab -l 2>/dev/null || echo "Empty crontab"

            echo ""
            echo "=== Killing monitor processes ==="
            pkill -f "health-monitor" 2>/dev/null && echo "Killed health-monitor" || echo "No health-monitor"
            pkill -f "log-forwarder" 2>/dev/null && echo "Killed log-forwarder" || echo "No log-forwarder"
            pkill -f "connie-health-check" 2>/dev/null && echo "Killed connie-health-check" || echo "No connie-health-check"

            echo ""
            echo "=== Stopping PM2 ==="
            PM2_HOME="$CONNIE_HOME/.pm2" pm2 delete all 2>/dev/null || true
            PM2_HOME="$CONNIE_HOME/.pm2" pm2 kill 2>/dev/null || true
            echo "PM2 stopped"

            echo ""
            echo "=== Disabling monitor scripts ==="
            for f in "$CONNIE_HOME/health-monitor.js" "$CONNIE_HOME/log-forwarder.py" "$CONNIE_HOME/connie-health-check.sh" "/root/connie-health-check.sh"; do
              if [ -f "$f" ]; then
                mv "$f" "$f.disabled"
                echo "Disabled: $f"
              else
                echo "Not found: $f"
              fi
            done

            echo ""
            echo "=== Restarting main service ==="
            systemctl restart local-connie
            sleep 3
            systemctl status local-connie --no-pager -l 2>&1 | head -10
