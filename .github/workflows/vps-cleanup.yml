name: VPS Cleanup Noisy Monitors
on:
  workflow_dispatch:
jobs:
  cleanup:
    name: Kill Noisy Discord Monitors
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            CONNIE_HOME=$(grep 'Environment=HOME=' /etc/systemd/system/local-connie.service 2>/dev/null | sed 's/.*HOME=//')

            echo "=== All custom systemd services ==="
            systemctl list-units --type=service --state=running --no-pager 2>/dev/null | grep -i "connie\|monitor\|watchdog\|polymarket\|alert" || echo "No matching services"

            echo ""
            echo "=== All systemd services in /etc/systemd/system ==="
            ls -la /etc/systemd/system/*connie* /etc/systemd/system/*monitor* /etc/systemd/system/*watchdog* /etc/systemd/system/*polymarket* 2>/dev/null || echo "No custom unit files"

            echo ""
            echo "=== All node/python processes ==="
            ps aux | grep -E "node|python" | grep -v grep | head -20

            echo ""
            echo "=== PM2 processes ==="
            PM2_HOME="$CONNIE_HOME/.pm2" pm2 list 2>/dev/null || echo "PM2 not running"

            echo ""
            echo "=== Crontab ==="
            crontab -l 2>/dev/null || echo "No crontab"

            echo ""
            echo "=== Files that could be monitors ==="
            find "$CONNIE_HOME" -maxdepth 2 -name "*monitor*" -o -name "*watchdog*" -o -name "*discord*" 2>/dev/null | head -20

            echo ""
            echo "=== Application error log (last 30 FATAL/ERROR lines) ==="
            grep -E "FATAL|ERROR|error|failed" /tmp/connie-research.log 2>/dev/null | tail -30

            echo ""
            echo "=== Killing ALL non-essential node/python processes ==="
            MYPID=$$
            CONNIE_PID=$(systemctl show local-connie --property=MainPID --value 2>/dev/null || echo "0")
            echo "Connie main PID: $CONNIE_PID"
            for pid in $(pgrep -x node 2>/dev/null || true); do
              if [ "$pid" != "$CONNIE_PID" ] && [ "$pid" != "$MYPID" ]; then
                CMD=$(ps -p "$pid" -o args= 2>/dev/null || true)
                echo "Killing node PID $pid: $CMD"
                kill "$pid" 2>/dev/null || true
              fi
            done

            echo ""
            echo "=== Removing cron jobs ==="
            crontab -l 2>/dev/null | grep -v "connie-health-check\|health-monitor\|log-forwarder\|discord\|monitor\|watchdog" | crontab - 2>/dev/null && echo "Cleaned crontab" || echo "No crontab to clean"

            echo ""
            echo "=== Stopping PM2 ==="
            PM2_HOME="$CONNIE_HOME/.pm2" pm2 delete all 2>/dev/null || true
            PM2_HOME="$CONNIE_HOME/.pm2" pm2 kill 2>/dev/null || true
            echo "PM2 stopped"

            echo ""
            echo "=== Disabling monitor scripts ==="
            for f in $(find "$CONNIE_HOME" -maxdepth 2 \( -name "*monitor*" -o -name "*watchdog*" \) -not -name "*.disabled" 2>/dev/null); do
              mv "$f" "$f.disabled" && echo "Disabled: $f" || echo "Failed to disable: $f"
            done

            echo ""
            echo "=== Removing agent-created Discord scripts ==="
            for f in $(find "$CONNIE_HOME" -maxdepth 1 -name "*discord*bot*.js" -o -name "*discord*bot*.log" 2>/dev/null); do
              rm -f "$f" && echo "Removed: $f" || echo "Failed: $f"
            done

            echo ""
            echo "=== FINDING ALL FILES THAT POST TO DISCORD ==="
            grep -rl "discord.com/api/webhooks\|discordapp.com/api/webhooks\|DISCORD_WEBHOOK\|discordWebhookUrl" "$CONNIE_HOME" --include="*.sh" --include="*.js" --include="*.ts" --include="*.py" --include="*.json" 2>/dev/null | while read f; do
              echo "--- FILE: $f ---"
              head -5 "$f" 2>/dev/null
              echo "..."
              grep -n "discord\|webhook\|monitor\|watchdog\|FATAL\|curl\|fetch" "$f" 2>/dev/null | head -10
              echo ""
            done
            echo "=== Also checking systemd overrides and timers ==="
            find /etc/systemd/system -name "*.service" -o -name "*.timer" 2>/dev/null | while read f; do
              if grep -qi "discord\|webhook\|monitor\|watchdog" "$f" 2>/dev/null; then
                echo "--- SYSTEMD: $f ---"
                cat "$f"
              fi
            done
            echo "=== Checking /root for crash/monitor scripts ==="
            find /root -maxdepth 2 \( -name "*crash*" -o -name "*monitor*" -o -name "*watchdog*" -o -name "*notify*" \) -type f 2>/dev/null | while read f; do
              echo "--- ROOT FILE: $f ---"
              head -20 "$f" 2>/dev/null
              echo ""
            done

            echo ""
            echo "=== DELETING ALL DISCORD-POSTING SCRIPTS ==="
            # Search EVERYWHERE for scripts with webhook URLs
            for SEARCH_DIR in "$CONNIE_HOME" /root; do
              grep -rl "discord.com/api/webhooks\|discordapp.com/api/webhooks" "$SEARCH_DIR" --include="*.sh" --include="*.js" --include="*.py" 2>/dev/null | while read f; do
                echo "DELETING: $f"
                rm -f "$f"
              done
            done
            # Nuke ALL crash notify scripts wherever they live
            find / -maxdepth 4 -name "connie-crash-notify*" -type f 2>/dev/null | while read f; do
              echo "DELETING crash-notify: $f"
              rm -f "$f"
            done

            echo ""
            echo "=== REMOVING ExecStopPost FROM SYSTEMD SERVICE ==="
            # This is THE source of "connie-watchdog" crash notifications
            if grep -q "ExecStopPost" /etc/systemd/system/local-connie.service 2>/dev/null; then
              sed -i '/ExecStopPost/d' /etc/systemd/system/local-connie.service
              echo "Removed ExecStopPost from local-connie.service"
              systemctl daemon-reload
            else
              echo "No ExecStopPost found (already clean)"
            fi

            echo ""
            echo "=== NEUTRALIZING spawn-agent.sh WEBHOOK POSTING ==="
            # spawn-agent.sh posts as "${NAME}-watchdog" on crash
            if [ -f "$CONNIE_HOME/spawn-agent.sh" ]; then
              sed -i 's|curl.*discord.com/api/webhooks[^"]*|echo "webhook-disabled"|g' "$CONNIE_HOME/spawn-agent.sh"
              echo "Neutralized Discord posts in spawn-agent.sh"
            fi

            echo ""
            echo "=== Actual FATAL/ERROR details ==="
            grep -E "\[FATAL\]|\[ERROR\]" /tmp/connie-research.log 2>/dev/null | tail -20

            echo ""
            echo "=== Restarting main service ==="
            systemctl daemon-reload
            systemctl restart local-connie
            sleep 3
            systemctl status local-connie --no-pager -l 2>&1 | head -10
