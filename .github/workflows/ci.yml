name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run build
      - name: Run tests
        timeout-minutes: 10
        run: |
          set +e
          timeout 300 pnpm test
          RC=$?
          set -e
          # Exit code 124 means timeout killed the process (vitest hung after tests completed)
          if [ $RC -eq 124 ]; then echo "::warning::vitest process hung after tests, killed by timeout"; exit 0; fi
          exit $RC
      - name: Run security tests
        timeout-minutes: 10
        run: |
          set +e
          timeout 180 pnpm test -- --grep "security|injection|policy|financial"
          RC=$?
          set -e
          if [ $RC -eq 124 ]; then echo "::warning::vitest process hung after tests, killed by timeout"; exit 0; fi
          exit $RC

  security-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high || true

  deploy:
    name: Deploy to Connie VPS
    runs-on: ubuntu-latest
    needs: [build, security-audit]
    if: github.event_name == 'push' && github.ref == 'refs/heads/feat/byok-inference-keys'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /root/.openclaw/workspace/artifacts/automaton-research
            git fetch origin feat/byok-inference-keys
            git reset --hard origin/feat/byok-inference-keys
            npm run build
            systemctl restart local-connie
            echo "Deploy complete: $(git rev-parse --short HEAD)"
