name: VPS Configure
on:
  workflow_dispatch:
jobs:
  configure:
    name: Configure Connie VPS
    runs-on: ubuntu-latest
    steps:
      - name: Configure via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            CONNIE_HOME=$(grep 'Environment=HOME=' /etc/systemd/system/local-connie.service 2>/dev/null | sed 's/.*HOME=//')
            CONFIG="$CONNIE_HOME/.automaton/automaton.json"

            echo "=== Current config ==="
            CONFIG="$CONFIG" python3 -c "
            import json, os
            c = json.load(open(os.environ['CONFIG']))
            for k in ['discordWebhookUrl', 'useSovereignProviders', 'vultrApiKey', 'inferenceModel', 'name']:
                v = c.get(k)
                if k in ['discordWebhookUrl', 'vultrApiKey']:
                    print(f'{k}: {\"SET\" if v else \"NOT SET\"}')
                else:
                    print(f'{k}: {v}')
            "

            echo ""
            echo "=== Configuring Discord webhook ==="
            # Extract webhook URL from SOUL.md into automaton.json (one-time migration)
            WEBHOOK=$(grep -o 'https://discord.com/api/webhooks/[^ "]*' "$CONNIE_HOME/.automaton/SOUL.md" 2>/dev/null | head -1)
            if [ -z "$WEBHOOK" ]; then
              # Already stripped from SOUL.md — check if it's in automaton.json
              WEBHOOK=$(CONFIG="$CONFIG" python3 -c "import json,os; c=json.load(open(os.environ['CONFIG'])); print(c.get('discordWebhookUrl',''))" 2>/dev/null)
            fi
            if [ -n "$WEBHOOK" ]; then
              WEBHOOK="$WEBHOOK" CONFIG="$CONFIG" python3 -c "
            import json, os
            c = json.load(open(os.environ['CONFIG']))
            c['discordWebhookUrl'] = os.environ['WEBHOOK']
            json.dump(c, open(os.environ['CONFIG'], 'w'), indent=2)
            print('Set discordWebhookUrl in automaton.json')
            "
            else
              echo "WARNING: No webhook URL found anywhere"
            fi

            echo ""
            echo "=== Stripping webhook URL from SOUL.md ==="
            # CRITICAL: Remove the literal webhook URL from SOUL.md so the agent
            # can't see it in its own system prompt. The heartbeat system reads it
            # from automaton.json directly — it does NOT need it in the prompt.
            SOUL="$CONNIE_HOME/.automaton/SOUL.md"
            if [ -f "$SOUL" ]; then
              cat > /tmp/strip-webhook.py << 'PYEOF'
            import re, sys
            soul_path = sys.argv[1]
            with open(soul_path, "r") as f:
                content = f.read()
            pattern = r"https://discord(?:app)?\.com/api/webhooks/\S+"
            cleaned = re.sub(pattern, "[managed by heartbeat system]", content)
            if content != cleaned:
                with open(soul_path, "w") as f:
                    f.write(cleaned)
                print("Stripped webhook URL(s) from SOUL.md")
            else:
                print("SOUL.md already clean - no webhook URLs found")
            PYEOF
              python3 /tmp/strip-webhook.py "$SOUL"
              rm -f /tmp/strip-webhook.py
            fi

            echo ""
            echo "=== Cleaning up agent-created Discord scripts ==="
            # Remove any agent-spawned discord bots, monitors, or webhook scripts
            for pattern in "discord-bot" "discord_bot" "*monitor*.js" "*watchdog*.js" "*webhook*.js"; do
              find "$CONNIE_HOME" -maxdepth 2 -name "$pattern" -type f 2>/dev/null | while read f; do
                echo "Removing: $f"
                rm -f "$f"
              done
              find "$CONNIE_HOME" -maxdepth 2 -name "$pattern" -type d 2>/dev/null | while read d; do
                echo "Removing dir: $d"
                rm -rf "$d"
              done
            done
            # Kill PM2 and delete dump so agent processes don't auto-restart
            PM2_HOME="$CONNIE_HOME/.pm2" pm2 delete all 2>/dev/null || true
            PM2_HOME="$CONNIE_HOME/.pm2" pm2 kill 2>/dev/null || true
            rm -f "$CONNIE_HOME/.pm2/dump.pm2"
            # Delete temp request body files that contain the webhook URL
            rm -f /tmp/request_body.json /tmp/request_body_air.json
            echo "Cleaned up agent-created scripts, PM2, and temp files"

            echo ""
            echo "=== Updating SOUL.md strategy section ==="
            SOUL="$CONNIE_HOME/.automaton/SOUL.md"
            if [ -f "$SOUL" ]; then
              cat > /tmp/strategy-update.txt << 'STRATEGY_EOF'
            ### Strategy

            Revenue Playbook: Always Be Building

            Maintain 2-3 parallel revenue tracks at all times. When one is blocked, pivot immediately to another.

            Prioritized venues (work down the list):
            1. API services: build and deploy paid API endpoints (market data, analytics, automation)
            2. Market intelligence: crypto/prediction market bots that surface alpha
            3. Content and analysis: automated research reports, trend analysis
            4. Automation tools: services that save humans time and money

            Operating principles:
            - Research before building: validate demand before investing turns
            - Start small: deploy an MVP in fewer than 10 turns, iterate based on results
            - If blocked (missing API key, rate limit, external dependency): log the blocker, pivot to next track
            - Solo work for research and prototyping; delegate via create_goal for full implementations
            - Update WORKLOG.md after every meaningful action so you don't lose context
            - Never idle: if workers are running, research your next venture in parallel
            STRATEGY_EOF
              SOUL="$SOUL" python3 -c "
            import re, os
            soul_path = os.environ['SOUL']
            with open(soul_path, 'r') as f:
                content = f.read()
            with open('/tmp/strategy-update.txt', 'r') as f:
                strategy = f.read().strip()
            pattern = r'### Strategy.*?(?=###|\Z)'
            if re.search(pattern, content, re.DOTALL):
                new_content = re.sub(pattern, strategy + '\n\n', content, count=1, flags=re.DOTALL)
            else:
                new_content = content.rstrip() + '\n\n' + strategy + '\n'
            with open(soul_path, 'w') as f:
                f.write(new_content)
            print('Updated strategy section in SOUL.md')
            "
            else
              echo "No SOUL.md found at $SOUL"
            fi

            echo ""
            echo "=== Restarting service ==="
            systemctl restart local-connie
            sleep 3
            systemctl status local-connie --no-pager -l 2>&1 | head -15

            echo ""
            echo "=== Updated config ==="
            CONFIG="$CONFIG" python3 -c "
            import json, os
            c = json.load(open(os.environ['CONFIG']))
            for k in ['discordWebhookUrl', 'useSovereignProviders', 'vultrApiKey', 'inferenceModel', 'name']:
                v = c.get(k)
                if k in ['discordWebhookUrl', 'vultrApiKey']:
                    print(f'{k}: {\"SET\" if v else \"NOT SET\"}')
                else:
                    print(f'{k}: {v}')
            "
