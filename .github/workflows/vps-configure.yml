name: VPS Configure
on:
  workflow_dispatch:
jobs:
  configure:
    name: Configure Connie VPS
    runs-on: ubuntu-latest
    steps:
      - name: Configure via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            CONNIE_HOME=$(grep 'Environment=HOME=' /etc/systemd/system/local-connie.service 2>/dev/null | sed 's/.*HOME=//')
            CONFIG="$CONNIE_HOME/.automaton/automaton.json"

            echo "=== Current config ==="
            CONFIG="$CONFIG" python3 -c "
            import json, os
            c = json.load(open(os.environ['CONFIG']))
            for k in ['discordWebhookUrl', 'socialRelayUrl', 'useSovereignProviders', 'vultrApiKey', 'cloudflareApiToken', 'cloudflareApiKey', 'cloudflareEmail', 'cloudflareZoneId', 'porkbunApiKey', 'porkbunSecretKey', 'inferenceModel', 'name']:
                v = c.get(k)
                if k in ['discordWebhookUrl', 'vultrApiKey', 'cloudflareApiToken', 'cloudflareApiKey', 'porkbunApiKey', 'porkbunSecretKey']:
                    print(f'{k}: {\"SET\" if v else \"NOT SET\"}')
                elif k in ['socialRelayUrl', 'cloudflareEmail', 'cloudflareZoneId']:
                    print(f'{k}: {\"SET\" if v else \"NOT SET\"}')
                else:
                    print(f'{k}: {v}')
            "

            echo ""
            echo "=== Applying provider and distribution config from secrets ==="
            VULTR_API_KEY='${{ secrets.VULTR_API_KEY }}'
            CLOUDFLARE_API_TOKEN='${{ secrets.CLOUDFLARE_API_TOKEN }}'
            CLOUDFLARE_API_KEY='${{ secrets.CLOUDFLARE_API_KEY }}'
            CLOUDFLARE_EMAIL='${{ secrets.CLOUDFLARE_EMAIL }}'
            CLOUDFLARE_ZONE_ID='${{ secrets.CLOUDFLARE_ZONE_ID }}'
            PORKBUN_API_KEY='${{ secrets.PORKBUN_API_KEY }}'
            PORKBUN_SECRET_KEY='${{ secrets.PORKBUN_SECRET_KEY }}'
            SOCIAL_RELAY_URL='${{ secrets.SOCIAL_RELAY_URL }}'
            OPERATOR_TARGETS_JSON='${{ secrets.OPERATOR_TARGETS_JSON }}'
            TARGETS_PATH="$CONNIE_HOME/.automaton/distribution-targets.json"
            PROVIDER_ENV="$CONNIE_HOME/.automaton/.env"

            CONFIG="$CONFIG" \
            VULTR_API_KEY="$VULTR_API_KEY" \
            CLOUDFLARE_API_TOKEN="$CLOUDFLARE_API_TOKEN" \
            CLOUDFLARE_API_KEY="$CLOUDFLARE_API_KEY" \
            CLOUDFLARE_EMAIL="$CLOUDFLARE_EMAIL" \
            CLOUDFLARE_ZONE_ID="$CLOUDFLARE_ZONE_ID" \
            PORKBUN_API_KEY="$PORKBUN_API_KEY" \
            PORKBUN_SECRET_KEY="$PORKBUN_SECRET_KEY" \
            python3 -c "
            import json, os

            p = os.environ['CONFIG']
            c = json.load(open(p))

            provider_keys = {
                'vultrApiKey': os.environ.get('VULTR_API_KEY', ''),
                'cloudflareApiToken': os.environ.get('CLOUDFLARE_API_TOKEN', ''),
                'cloudflareApiKey': os.environ.get('CLOUDFLARE_API_KEY', ''),
                'cloudflareEmail': os.environ.get('CLOUDFLARE_EMAIL', ''),
                'cloudflareZoneId': os.environ.get('CLOUDFLARE_ZONE_ID', ''),
                'porkbunApiKey': os.environ.get('PORKBUN_API_KEY', ''),
                'porkbunSecretKey': os.environ.get('PORKBUN_SECRET_KEY', ''),
            }

            changed = []
            for key, value in provider_keys.items():
                if value:
                    c[key] = value
                    changed.append(key)

            has_cloudflare = bool(c.get('cloudflareApiToken')) or bool(c.get('cloudflareApiKey') and c.get('cloudflareEmail'))
            has_sovereign = bool(c.get('vultrApiKey')) or has_cloudflare or bool(c.get('porkbunApiKey') and c.get('porkbunSecretKey'))
            c['useSovereignProviders'] = has_sovereign

            json.dump(c, open(p, 'w'), indent=2)

            if changed:
                print('Updated provider config from secrets:', ', '.join(changed))
            else:
                print('No provider secrets supplied; existing provider config preserved')
            print(f'useSovereignProviders set to {has_sovereign}')
            "

            if [ -n "$SOCIAL_RELAY_URL" ]; then
              CONFIG="$CONFIG" SOCIAL_RELAY_URL="$SOCIAL_RELAY_URL" python3 -c "
            import json, os
            p = os.environ['CONFIG']
            c = json.load(open(p))
            c['socialRelayUrl'] = os.environ['SOCIAL_RELAY_URL']
            json.dump(c, open(p, 'w'), indent=2)
            print('Set socialRelayUrl from SOCIAL_RELAY_URL secret')
            "
            else
              echo "SOCIAL_RELAY_URL secret not set; leaving existing socialRelayUrl unchanged"
            fi

            if [ -n "$OPERATOR_TARGETS_JSON" ]; then
              mkdir -p "$(dirname "$TARGETS_PATH")"
              TARGETS_PATH="$TARGETS_PATH" OPERATOR_TARGETS_JSON="$OPERATOR_TARGETS_JSON" python3 -c "
            import json, os, pathlib
            obj = json.loads(os.environ['OPERATOR_TARGETS_JSON'])
            p = pathlib.Path(os.environ['TARGETS_PATH'])
            p.write_text(json.dumps(obj, indent=2) + '\n', encoding='utf-8')
            print(f'Wrote operator targets JSON to {p}')
            "
            else
              echo "OPERATOR_TARGETS_JSON secret not set; leaving distribution-targets.json unchanged"
            fi

            echo ""
            echo "=== Writing protected provider .env ==="
            mkdir -p "$(dirname "$PROVIDER_ENV")"
            {
              echo "# Managed by vps-configure.yml"
              echo "# Provider/runtime secrets for server-side operations"
              [ -n "$VULTR_API_KEY" ] && printf 'VULTR_API_KEY=%s\n' "$VULTR_API_KEY"
              [ -n "$CLOUDFLARE_API_TOKEN" ] && printf 'CLOUDFLARE_API_TOKEN=%s\n' "$CLOUDFLARE_API_TOKEN"
              [ -n "$CLOUDFLARE_API_KEY" ] && printf 'CLOUDFLARE_API_KEY=%s\n' "$CLOUDFLARE_API_KEY"
              [ -n "$CLOUDFLARE_EMAIL" ] && printf 'CLOUDFLARE_EMAIL=%s\n' "$CLOUDFLARE_EMAIL"
              [ -n "$CLOUDFLARE_ZONE_ID" ] && printf 'CLOUDFLARE_ZONE_ID=%s\n' "$CLOUDFLARE_ZONE_ID"
              [ -n "$PORKBUN_API_KEY" ] && printf 'PORKBUN_API_KEY=%s\n' "$PORKBUN_API_KEY"
              [ -n "$PORKBUN_SECRET_KEY" ] && printf 'PORKBUN_SECRET_KEY=%s\n' "$PORKBUN_SECRET_KEY"
              [ -n "$SOCIAL_RELAY_URL" ] && printf 'SOCIAL_RELAY_URL=%s\n' "$SOCIAL_RELAY_URL"
            } > "$PROVIDER_ENV"
            chmod 600 "$PROVIDER_ENV"
            echo "Wrote protected provider env file: $PROVIDER_ENV"

            echo ""
            echo "=== Configuring Discord webhook (systemd env var) ==="
            # SECURITY: Move webhook URL OUT of automaton.json (agent can read that)
            # and INTO a systemd environment variable (agent cannot access).
            # The heartbeat reads process.env.DISCORD_WEBHOOK_URL as fallback.

            # 1. Extract webhook URL from wherever it currently lives
            WEBHOOK=""
            # Try automaton.json first (where it used to be stored)
            WEBHOOK=$(CONFIG="$CONFIG" python3 -c "import json,os; c=json.load(open(os.environ['CONFIG'])); print(c.get('discordWebhookUrl',''))" 2>/dev/null)
            # Try SOUL.md if not in config
            if [ -z "$WEBHOOK" ]; then
              WEBHOOK=$(grep -o 'https://discord.com/api/webhooks/[^ "]*' "$CONNIE_HOME/.automaton/SOUL.md" 2>/dev/null | head -1)
            fi
            # Try existing systemd env override
            if [ -z "$WEBHOOK" ]; then
              WEBHOOK=$(grep 'DISCORD_WEBHOOK_URL=' /etc/systemd/system/local-connie.service.d/webhook.conf 2>/dev/null | sed 's/.*DISCORD_WEBHOOK_URL=//')
            fi

            if [ -n "$WEBHOOK" ]; then
              # 2. Write webhook URL to systemd env override (only root can read this)
              mkdir -p /etc/systemd/system/local-connie.service.d
              echo "[Service]" > /etc/systemd/system/local-connie.service.d/webhook.conf
              echo "Environment=DISCORD_WEBHOOK_URL=$WEBHOOK" >> /etc/systemd/system/local-connie.service.d/webhook.conf
              chmod 600 /etc/systemd/system/local-connie.service.d/webhook.conf
              echo "Webhook URL stored in systemd env override (root-only)"

              # 3. REMOVE webhook URL from automaton.json (agent-accessible)
              CONFIG="$CONFIG" python3 -c "
            import json, os
            config_path = os.environ['CONFIG']
            c = json.load(open(config_path))
            if 'discordWebhookUrl' in c:
                del c['discordWebhookUrl']
                json.dump(c, open(config_path, 'w'), indent=2)
                print('Removed discordWebhookUrl from automaton.json')
            else:
                print('automaton.json already clean')
            "
              systemctl daemon-reload
              echo "systemd daemon reloaded"
            else
              echo "WARNING: No webhook URL found anywhere"
            fi

            echo ""
            echo "=== Stripping webhook URL from SOUL.md ==="
            # CRITICAL: Remove the literal webhook URL from SOUL.md so the agent
            # can't see it in its own system prompt. The heartbeat system reads it
            # from automaton.json directly — it does NOT need it in the prompt.
            SOUL="$CONNIE_HOME/.automaton/SOUL.md"
            if [ -f "$SOUL" ]; then
              cat > /tmp/strip-webhook.py << 'PYEOF'
            import re, sys
            soul_path = sys.argv[1]
            with open(soul_path, "r") as f:
                content = f.read()
            pattern = r"https://discord(?:app)?\.com/api/webhooks/\S+"
            cleaned = re.sub(pattern, "[managed by heartbeat system]", content)
            if content != cleaned:
                with open(soul_path, "w") as f:
                    f.write(cleaned)
                print("Stripped webhook URL(s) from SOUL.md")
            else:
                print("SOUL.md already clean - no webhook URLs found")
            PYEOF
              python3 /tmp/strip-webhook.py "$SOUL"
              rm -f /tmp/strip-webhook.py
            fi

            echo ""
            echo "=== Cleaning up agent-created Discord scripts ==="
            # Remove any agent-spawned discord bots, monitors, watchdog, or webhook scripts
            for pattern in "discord-bot" "discord_bot" "*monitor*.js" "*watchdog*.js" "*webhook*.js" "*health-check*.sh" "*health-check*.js" "*traffic-engine*" "*aggressive-traffic*"; do
              find "$CONNIE_HOME" -maxdepth 3 -name "$pattern" -type f 2>/dev/null | while read f; do
                echo "Removing: $f"
                rm -f "$f"
              done
              find "$CONNIE_HOME" -maxdepth 3 -name "$pattern" -type d 2>/dev/null | while read d; do
                echo "Removing dir: $d"
                rm -rf "$d"
              done
            done
            # Explicitly retire legacy watchdog script if present.
            rm -f "$CONNIE_HOME/connie-health-check.sh" "$CONNIE_HOME/scripts/connie-health-check.sh"
            rm -f /root/.automaton-research-home/connie-health-check.sh /root/.automaton-research-home/scripts/connie-health-check.sh
            # Remove cron entries that invoke legacy watchdog/health-check scripts.
            for USERNAME in root "$USER"; do
              crontab -u "$USERNAME" -l 2>/dev/null \
                | grep -vE "connie-health-check|connie-watchdog|watchdog.*connie|/\\.automaton-research-home/scripts/watchdog" \
                | crontab -u "$USERNAME" - 2>/dev/null || true
            done
            # Also clean /tmp of watchdog/monitor artifacts
            rm -f /tmp/connie-watchdog.log /tmp/connie-health-check.sh /tmp/request_body.json /tmp/request_body_air.json
            # Kill PM2 and delete dump so agent processes don't auto-restart
            PM2_HOME="$CONNIE_HOME/.pm2" pm2 delete all 2>/dev/null || true
            PM2_HOME="$CONNIE_HOME/.pm2" pm2 kill 2>/dev/null || true
            rm -f "$CONNIE_HOME/.pm2/dump.pm2"
            # Kill root PM2 too (PID 5006 from investigation was root's)
            pm2 delete all 2>/dev/null || true
            pm2 kill 2>/dev/null || true
            rm -f ~/.pm2/dump.pm2
            echo "Cleaned up agent-created scripts, PM2, and temp files"

            echo ""
            echo "=== Updating SOUL.md strategy section ==="
            SOUL="$CONNIE_HOME/.automaton/SOUL.md"
            if [ -f "$SOUL" ]; then
              cat > /tmp/strategy-update.txt << 'STRATEGY_EOF'
            ### Strategy

            How I Actually Earn:
            I do NOT have a way to receive inbound payments autonomously. No payment gateway,
            no billing system, no x402 server. The only way I get funded is when Damon sees
            value in my work and tops me up. This means:

            **My real job: demonstrate clear, visible value to Damon.**

            What "value" looks like (prioritized):
            1. **Working services people can see:** Deploy APIs on exposed ports that serve real
               data. The Polymarket API at localhost:8081 is a good start. Build more like it —
               data endpoints Damon can show off or monetize manually.
            2. **Twitter presence:** Post useful market analysis to @alfred_ceo. Real insights,
               not spam. This builds audience that Damon can monetize.
            3. **Research & analysis:** Write market reports, identify opportunities, produce
               content that has standalone value. Save results to files Damon can access.
            4. **Infrastructure that compounds:** Improve my own tools, skills, and processes
               so I get better over time.

            What does NOT work (stop doing these):
            - Writing scripts and adding them to heartbeat via modify_heartbeat. Custom heartbeat
              entries do NOT execute. Only built-in tasks run. Writing a script and thinking
              "heartbeat will run it" wastes inference credits on dead code.
            - Building "revenue services" with no payment mechanism. I cannot collect money.
            - Sleeping for hours saying "services are running." Nothing runs while I sleep
              except the built-in heartbeat (which posts Discord updates, not my code).
            - Spawning background processes. I am blocked from nohup/pm2/screen. Use exec to
              run things synchronously, or use create_goal for sustained work.

            Operating rhythm:
            - Wake up -> check orchestrator status ONCE -> do productive work -> sleep 15-30 min
            - Productive work means: research, write code, test it, deploy it, tweet about it
            - Every session: update WORKLOG.md with what I did and what's next
            - If blocked: note it in WORKLOG.md under "## Blockers" and pivot to something else
            - Conserve inference credits: don't repeat tool calls, don't idle, don't loop
            STRATEGY_EOF
              SOUL="$SOUL" python3 -c "
            import re, os
            soul_path = os.environ['SOUL']
            with open(soul_path, 'r') as f:
                content = f.read()
            with open('/tmp/strategy-update.txt', 'r') as f:
                strategy = f.read().strip()
            pattern = r'### Strategy.*?(?=###|\Z)'
            if re.search(pattern, content, re.DOTALL):
                new_content = re.sub(pattern, strategy + '\n\n', content, count=1, flags=re.DOTALL)
            else:
                new_content = content.rstrip() + '\n\n' + strategy + '\n'
            with open(soul_path, 'w') as f:
                f.write(new_content)
            print('Updated strategy section in SOUL.md')
            "
            else
              echo "No SOUL.md found at $SOUL"
            fi

            echo ""
            echo "=== Deploying latest code ==="
            # Find the source repo and pull + rebuild
            REPO=$(grep 'ExecStart=' /etc/systemd/system/local-connie.service 2>/dev/null | sed 's/.*node //' | sed 's|/dist/.*||')
            if [ -d "$REPO/.git" ]; then
              cd "$REPO"
              echo "Repo: $REPO"
              echo "Current: $(git log -1 --oneline)"
              git fetch origin main --quiet 2>/dev/null || true
              BEHIND=$(git log HEAD..origin/main --oneline 2>/dev/null | wc -l)
              echo "Behind origin/main: $BEHIND commits"
              if [ "$BEHIND" -gt 0 ]; then
                git pull origin main --ff-only 2>&1 || echo "Pull failed (non-ff)"
              fi
              # Always rebuild to recover from broken native addons
              npm rebuild better-sqlite3 2>&1 | tail -5
              npm install 2>&1 | tail -5
              npm run build 2>&1 | tail -5
              echo "Deployed: $(git log -1 --oneline)"
              cd /
            else
              echo "Repo not found at $REPO"
            fi

            echo ""
            echo "=== Restarting service ==="
            systemctl restart local-connie
            sleep 3
            systemctl status local-connie --no-pager -l 2>&1 | head -15

            echo ""
            echo "=== Updated config ==="
            CONFIG="$CONFIG" python3 -c "
            import json, os
            c = json.load(open(os.environ['CONFIG']))
            for k in ['discordWebhookUrl', 'socialRelayUrl', 'useSovereignProviders', 'vultrApiKey', 'cloudflareApiToken', 'cloudflareApiKey', 'cloudflareEmail', 'cloudflareZoneId', 'porkbunApiKey', 'porkbunSecretKey', 'inferenceModel', 'name']:
                v = c.get(k)
                if k in ['discordWebhookUrl', 'vultrApiKey', 'cloudflareApiToken', 'cloudflareApiKey', 'porkbunApiKey', 'porkbunSecretKey']:
                    print(f'{k}: {\"SET\" if v else \"NOT SET\"}')
                elif k in ['socialRelayUrl', 'cloudflareEmail', 'cloudflareZoneId']:
                    print(f'{k}: {\"SET\" if v else \"NOT SET\"}')
                else:
                    print(f'{k}: {v}')
            "
            TARGETS_PATH="$CONNIE_HOME/.automaton/distribution-targets.json"
            if [ -f "$TARGETS_PATH" ]; then
              echo "distribution-targets.json: PRESENT ($TARGETS_PATH)"
            else
              echo "distribution-targets.json: MISSING ($TARGETS_PATH)"
            fi
            if [ -f "$PROVIDER_ENV" ]; then
              echo ".env: PRESENT ($PROVIDER_ENV)"
            else
              echo ".env: MISSING ($PROVIDER_ENV)"
            fi
            echo ""
            echo "=== Webhook security verification ==="
            # Verify webhook URL is NOT in automaton.json
            if CONFIG="$CONFIG" python3 -c "import json,os; c=json.load(open(os.environ['CONFIG'])); exit(0 if 'discordWebhookUrl' in c else 1)" 2>/dev/null; then
              echo "WARNING: discordWebhookUrl still in automaton.json!"
            else
              echo "OK: discordWebhookUrl NOT in automaton.json"
            fi
            # Verify webhook URL IS in systemd env
            if grep -q 'DISCORD_WEBHOOK_URL=' /etc/systemd/system/local-connie.service.d/webhook.conf 2>/dev/null; then
              echo "OK: DISCORD_WEBHOOK_URL set in systemd env override"
            else
              echo "WARNING: DISCORD_WEBHOOK_URL not in systemd env!"
            fi
            # Verify SOUL.md is clean
            if grep -q "discord.com/api/webhooks" "$CONNIE_HOME/.automaton/SOUL.md" 2>/dev/null; then
              echo "WARNING: Webhook URL still in SOUL.md!"
            else
              echo "OK: No webhook URL in SOUL.md"
            fi
