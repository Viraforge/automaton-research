name: Fix Compintel Apex Route

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/fix-compintel-apex.yml"
  workflow_dispatch:

jobs:
  fix-apex:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail

            CONNIE_HOME=$(grep 'Environment=HOME=' /etc/systemd/system/local-connie.service 2>/dev/null | sed 's/.*HOME=//')
            SITE_ROOT="$CONNIE_HOME/.automaton/site"
            sudo cp /etc/caddy/Caddyfile /etc/caddy/Caddyfile.fix.bak.$(date +%s)

            for f in /etc/caddy/Caddyfile /etc/caddy/Caddyfile.* /etc/caddy/automaton-sites/*.caddy; do
              [ -f "$f" ] || continue
              if grep -q '^compintel.co {' "$f" 2>/dev/null; then
                sudo python3 -c 'import pathlib,re,sys; p=pathlib.Path(sys.argv[1]); t=p.read_text(); p.write_text(re.sub(r"(?ms)^compintel\\.co\\s*\\{.*?^}\\n?", "", t))' "$f"
              fi
            done

            printf '%s\n' \
              'compintel.co {' \
              "    root * $SITE_ROOT" \
              '    file_server' \
              '}' | sudo tee /etc/caddy/Caddyfile.root >/dev/null

            sudo sed -i '/import \/etc\/caddy\/Caddyfile\.root/d' /etc/caddy/Caddyfile
            sudo sed -i '/BEGIN AUTOMATON ROOT IMPORT/,/END AUTOMATON ROOT IMPORT/d' /etc/caddy/Caddyfile

            printf '%s\n' \
              '' \
              '# BEGIN AUTOMATON ROOT IMPORT' \
              'import /etc/caddy/Caddyfile.root' \
              '# END AUTOMATON ROOT IMPORT' | sudo tee -a /etc/caddy/Caddyfile >/dev/null

            sudo caddy validate --config /etc/caddy/Caddyfile
            sudo systemctl reload caddy
            sleep 3

            echo "=== Apex Verification ==="
            curl -sSI https://compintel.co | grep -E 'HTTP|content-type'
            curl -sS https://compintel.co | head -3
