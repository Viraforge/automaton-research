name: VPS Caddy Prune Stale Hosts

on:
  workflow_dispatch:

jobs:
  prune-stale:
    name: Prune stale Caddy host blocks
    runs-on: ubuntu-latest
    steps:
      - name: Prune stale host configs via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail

            sudo cp /etc/caddy/Caddyfile /etc/caddy/Caddyfile.bak.$(date +%s)

            sudo python3 - <<'PY'
            import glob
            import os
            import re
            import subprocess

            stale_hosts = {
              "simple-paid-api.compintel.co",
              "webhook-paid.compintel.co",
              "lead-api.compintel.co",
              "paid-data-api.compintel.co",
            }
            root_file = "/etc/caddy/Caddyfile"

            host_line = re.compile(r"^\s*([a-z0-9.-]+\.compintel\.co)\s*\{\s*$", re.I)
            upstream_line = re.compile(r"reverse_proxy\s+http://127\.0\.0\.1:(\d+)")

            def local_health_ok(port: str) -> bool:
              try:
                result = subprocess.run(
                  ["curl", "-fsS", "--max-time", "2", f"http://127.0.0.1:{port}/health"],
                  check=False,
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
                )
                return result.returncode == 0
              except Exception:
                return False

            removable_import_files = set()
            for path in sorted(glob.glob("/etc/caddy/Caddyfile.published-*")):
              if not os.path.isfile(path):
                continue
              host = ""
              port = ""
              with open(path, "r", encoding="utf-8", errors="replace") as f:
                for line in f:
                  host_match = host_line.match(line.strip())
                  if host_match and not host:
                    host = host_match.group(1).lower()
                  port_match = upstream_line.search(line)
                  if port_match and not port:
                    port = port_match.group(1)

              if not host or not port:
                removable_import_files.add(path)
                continue

              if host in stale_hosts:
                removable_import_files.add(path)
                continue

              if not local_health_ok(port):
                removable_import_files.add(path)

            root_changed = False
            root_lines = []
            removed_import_lines = 0
            if os.path.isfile(root_file):
              with open(root_file, "r", encoding="utf-8", errors="replace") as f:
                for line in f:
                  stripped = line.strip()
                  import_match = re.match(r"^import\s+(/etc/caddy/Caddyfile\.published-[A-Za-z0-9.-]+)\s*$", stripped)
                  if import_match and import_match.group(1) in removable_import_files:
                    removed_import_lines += 1
                    root_changed = True
                    continue
                  root_lines.append(line)

            if root_changed:
              with open(root_file, "w", encoding="utf-8") as f:
                f.writelines(root_lines)

            removed_files = 0
            for path in sorted(removable_import_files):
              if os.path.isfile(path):
                os.remove(path)
                removed_files += 1

            print(f"Removed stale import lines: {removed_import_lines}")
            print(f"Removed stale published files: {removed_files}")
            for path in sorted(removable_import_files):
              print(f"Pruned: {path}")
            PY

            sudo caddy validate --config /etc/caddy/Caddyfile
            sudo systemctl reload caddy
            sleep 2

            curl -sS -o /dev/null -w "relay.compintel.co %{http_code}\n" https://relay.compintel.co/health || true
            curl -sS -o /dev/null -w "api.compintel.co %{http_code}\n" https://api.compintel.co/health || true
            curl -sS -o /dev/null -w "compintel.co %{http_code}\n" https://compintel.co || true

