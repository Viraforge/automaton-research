name: VPS Caddy Prune Stale Hosts

on:
  workflow_dispatch:

jobs:
  prune-stale:
    name: Prune stale Caddy host blocks
    runs-on: ubuntu-latest
    steps:
      - name: Prune stale host configs via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail

            sudo cp /etc/caddy/Caddyfile /etc/caddy/Caddyfile.bak.$(date +%s)

            sudo python3 - <<'PY'
            import glob
            import os
            import re

            stale_hosts = [
              "simple-paid-api.compintel.co",
              "webhook-paid.compintel.co",
              "lead-api.compintel.co",
              "paid-data-api.compintel.co",
            ]

            root_file = "/etc/caddy/Caddyfile"
            candidate_files = [root_file] + sorted(glob.glob("/etc/caddy/Caddyfile.*"))
            candidate_files = [p for p in candidate_files if os.path.isfile(p)]

            host_patterns = [re.compile(rf"^\s*{re.escape(host)}\s*\{{\s*$") for host in stale_hosts]
            import_patterns = [re.compile(rf"^\s*import\s+/etc/caddy/Caddyfile\.{re.escape(host.split('.')[0])}\s*$") for host in stale_hosts]

            def prune_content(text: str) -> tuple[str, int]:
              lines = text.splitlines()
              out = []
              removed = 0
              i = 0
              while i < len(lines):
                line = lines[i]
                stripped = line.strip()

                if any(p.match(stripped) for p in import_patterns):
                  removed += 1
                  i += 1
                  continue

                if any(p.match(stripped) for p in host_patterns):
                  removed += 1
                  depth = line.count("{") - line.count("}")
                  i += 1
                  while i < len(lines):
                    removed += 1
                    next_line = lines[i]
                    depth += next_line.count("{") - next_line.count("}")
                    i += 1
                    if depth <= 0:
                      break
                  continue

                out.append(line)
                i += 1

              return ("\n".join(out) + ("\n" if text.endswith("\n") else "")), removed

            total_removed = 0
            touched = []
            for path in candidate_files:
              with open(path, "r", encoding="utf-8", errors="replace") as f:
                original = f.read()
              updated, removed = prune_content(original)
              if removed > 0:
                with open(path, "w", encoding="utf-8") as f:
                  f.write(updated)
                touched.append((path, removed))
                total_removed += removed

            print(f"Pruned total lines: {total_removed}")
            for path, removed in touched:
              print(f"Updated {path} (removed {removed} lines)")
            PY

            sudo caddy validate --config /etc/caddy/Caddyfile
            sudo systemctl reload caddy
            sleep 2

            curl -sS -o /dev/null -w "relay.compintel.co %{http_code}\n" https://relay.compintel.co/health || true
            curl -sS -o /dev/null -w "api.compintel.co %{http_code}\n" https://api.compintel.co/health || true
            curl -sS -o /dev/null -w "compintel.co %{http_code}\n" https://compintel.co || true

